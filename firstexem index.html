<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Annual Exam - Digital Pink Edition</title>
    <style>
        :root {
            --primary-pink: #ffafbd;
            --deep-pink: #ff6a88;
            --accent-purple: #9d50bb;
            --text-color: #4a148c;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Hind Siliguri', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
            color: var(--text-color);
            min-height: 100vh;
        }

        .exam-paper {
            max-width: 950px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 4px solid #ffffff;
            backdrop-filter: blur(10px);
        }

        .header-box {
            text-align: center;
            background: linear-gradient(to right, #ff6a88, #ff99ac);
            padding: 25px;
            border-radius: 20px;
            color: white;
            margin-bottom: 30px;
        }

        .student-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #ffe4e9;
            padding: 20px;
            border-radius: 15px;
        }

        .section-card {
            background: white;
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 20px;
            border-left: 8px solid var(--deep-pink);
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--deep-pink);
            margin-bottom: 20px;
        }

        input[type="text"], textarea {
            border: none;
            border-bottom: 2px dashed #ff6a88;
            padding: 8px;
            background: transparent;
            color: #d81b60;
            font-size: 16px;
        }

        .full-width-input { width: 100%; margin-top: 10px; border: 1px solid #ffcad4; border-radius: 8px; padding: 10px; }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-weight: bold;
        }

        .btn-submit { background: linear-gradient(45deg, #ff6a88, #9d50bb); }
        .btn-download { background: #2ecc71; }

        /* Hide buttons during PDF generation */
        @media print {
            .btn-group, .student-details input { display: none; }
            body { background: white; }
            .exam-paper { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="exam-paper" id="printablePaper">
    <div class="header-box">
        <h1>🌸 বার্ষিক পরীক্ষা (Annual Exam) 🌸</h1>
        <p>শ্রেণী: প্রথম (Class 1) | বিষয়: বাংলা</p>
    </div>

    <form id="examForm">
        <div class="student-details">
            <input type="text" id="studentName" placeholder="📝 ছাত্র/ছাত্রীর নাম">
            <input type="text" placeholder="🔢 রোল নম্বর">
        </div>

        <div class="section-card">
            <div class="section-title">১. ৩ অক্ষরের শব্দ গঠন:</div>
            <p>ক) আ - <input type="text" name="q1a"> খ) ব - <input type="text" name="q1b"></p>
        </div>

        <div class="section-card">
            <div class="section-title">২. বিপরীত শব্দ:</div>
            <p>সাদা ✖️ <input type="text" name="q2a"> ভালো ✖️ <input type="text" name="q2b"></p>
        </div>

        <div class="section-card">
            <div class="section-title">৩. বাক্য রচনা:</div>
            <p>বাঘ 🐯: <input type="text" class="full-width-input" name="q3a"></p>
            <p>বাড়ি 🏠: <input type="text" class="full-width-input" name="q3b"></p>
        </div>

        <div class="btn-group">
            <button type="button" class="btn btn-submit" onclick="submitExam()">✅ জমা দিন (Submit)</button>
            <button type="button" class="btn btn-download" onclick="downloadPaper()">📥 ডাউনলোড (Download PDF)</button>
        </div>
    </form>
</div>

<script>
    function submitExam() {
        alert("আপনার উত্তরপত্র সফলভাবে জমা দেওয়া হয়েছে! আপনি এখন ডাউনলোড করতে পারেন।");
    }

    function downloadPaper() {
        // Method 1: Opens the print dialog which allows "Save as PDF"
        // This is the best way to keep colors and layout.
        window.print();
    }
</script>

</body>
</html>
